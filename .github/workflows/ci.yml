name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            web/pnpm-lock.yaml
            admin/pnpm-lock.yaml
            api/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          cd api && pnpm install --frozen-lockfile
          cd ../web && pnpm install --frozen-lockfile
          cd ../admin && pnpm install --frozen-lockfile

      - name: Lint web
        run: cd web && pnpm run lint

      - name: Build web
        run: cd web && pnpm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Build admin
        run: cd admin && pnpm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Type check API
        run: cd api && npx tsc --noEmit
