name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: []  # 如果想等 CI 通过再部署，改为: needs: [lint-and-build] 并合并到同一 workflow

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing API dependencies..."
            cd api && pnpm install --prod --frozen-lockfile
            cd ..

            echo "==> Installing and building web..."
            cd web && pnpm install --frozen-lockfile && pnpm run build
            cd ..

            echo "==> Installing and building admin..."
            cd admin && pnpm install --frozen-lockfile && pnpm run build
            cd ..

            echo "==> Running DB migrations..."
            cd api && pnpm run db:migrate
            cd ..

            echo "==> Restarting services..."
            pm2 restart ecosystem.config.js --update-env

            echo "==> Deploy complete!"
